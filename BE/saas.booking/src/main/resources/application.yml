spring:
  application:
    name: saas-booking-system
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:}
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:1s}
      timeout: ${REDIS_COMMAND_TIMEOUT:2s}
      repositories:
        enabled: false
  cache:
    type: redis
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  cache:
    ttl:
      provider-search: ${CACHE_TTL_PROVIDER_SEARCH:5m}
      provider-details: ${CACHE_TTL_PROVIDER_DETAILS:15m}
      provider-services: ${CACHE_TTL_PROVIDER_SERVICES:10m}
      service-details: ${CACHE_TTL_SERVICE_DETAILS:10m}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
    issuer: ${JWT_ISSUER:saas-booking-system}
    audience: ${JWT_AUDIENCE:saas-booking-api}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    persist-authorization: true

server:
  error:
    include-message: never
