spring:
  datasource:
    url: jdbc:h2:mem:booking-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  docker:
    compose:
      enabled: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:5174
      - http://127.0.0.1:5173
      - http://127.0.0.1:5174
