spring:
  cache:
    type: none
  data:
    redis:
      repositories:
        enabled: false
  datasource:
    url: jdbc:h2:mem:booking-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret
    expiration: 86400000
    issuer: saas-booking-system-test
    audience: saas-booking-api-test
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
logging:
  level:
    root: INFO
    it.booking: INFO
